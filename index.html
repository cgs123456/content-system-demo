
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content System - 内容管理系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎉 Content System</h1>
            <p>功能完整的内容管理系统 - 演示所有改进功能</p>
        </div>
        
        <div class="main-grid">
            <div class="sidebar">
                <div class="card">
                    <h3>👤 当前用户</h3>
                    <div id="currentUser">未选择用户</div>
                    <div class="switch-user-btn">
                        <button class="btn btn-outline" onclick="openMemberModal()">切换用户</button>
                    </div>
                </div>
                
                <div class="card">
                    <h3>📝 发布内容</h3>
                    <div class="form-group">
                        <label>内容类型</label>
                        <select id="contentType" title="选择内容类型">
                            <option value="post">帖子</option>
                            <option value="article">文章</option>
                            <option value="note">笔记</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>标题</label>
                        <input type="text" id="contentTitle" placeholder="输入标题">
                    </div>
                    <div class="form-group">
                        <label>内容</label>
                        <textarea id="contentBody" placeholder="输入内容"></textarea>
                    </div>
                    <div class="form-group">
                        <label>状态</label>
                        <select id="contentStatus" title="选择内容状态">
                            <option value="published">发布</option>
                            <option value="draft">草稿</option>
                        </select>
                    </div>
                    <button class="btn" onclick="publishContent()">发布内容</button>
                </div>
                
                <div class="card">
                    <h3>📋 快捷操作</h3>
                    <button class="btn action-btn" onclick="loadDemoData()">🎯 加载演示数据</button>
                    <button class="btn btn-outline" onclick="refreshAll()">🔄 刷新数据</button>
                </div>
            </div>
            
            <div class="content-area">
                <div class="tabs">
                    <button class="tab active" data-tab="all" onclick="switchTab('all')">全部内容</button>
                    <button class="tab" data-tab="draft" onclick="switchTab('draft')">草稿</button>
                    <button class="tab" data-tab="archived" onclick="switchTab('archived')">归档</button>
                    <button class="tab" data-tab="trash" onclick="switchTab('trash')">回收站</button>
                </div>
                
                <div id="contentList" class="content-list">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        <p>暂无内容，点击 "加载演示数据" 开始</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 成员选择模态框 -->
    <div id="memberModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">选择用户</h2>
            <div id="memberListModal"></div>
            <button class="modal-close-btn" onclick="closeMemberModal()">取消</button>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api';
        
        let state = {
            currentUser: null,
            members: [],
            communities: [],
            contents: [],
            currentTab: 'all'
        };
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadMembers();
            loadCommunities();
            loadContents();
        });
        
        // API 请求辅助函数
        async function apiRequest(endpoint, method = 'GET', body = null) {
            try {
                const options = {
                    method,
                    headers: { 'Content-Type': 'application/json' }
                };
                
                if (body) {
                    options.body = JSON.stringify(body);
                }
                
                const response = await fetch(`${API_BASE}${endpoint}`, options);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return { error: error.message };
            }
        }
        
        // 加载成员
        async function loadMembers() {
            const data = await apiRequest('/members');
            if (!data.error) {
                state.members = data;
                if (data.length > 0 && !state.currentUser) {
                    selectMember(data[0]);
                }
            }
        }
        
        // 加载社区
        async function loadCommunities() {
            const data = await apiRequest('/communities');
            if (!data.error) {
                state.communities = data;
            }
        }
        
        // 加载内容
        async function loadContents() {
            const data = await apiRequest('/contents');
            if (!data.error) {
                state.contents = data;
                renderContents();
            }
        }
        
        // 选择成员
        function selectMember(member) {
            state.currentUser = { id: member.id, type: 'member', name: member.name };
            document.getElementById('currentUser').innerHTML = `
                <div class="user-info">
                    <div class="active-indicator"></div>
                    <strong>${member.name}</strong>
                </div>
                <small class="user-info-email">${member.email || 'member@example.com'}</small>
            `;
        }
        
        // 打开成员选择模态框
        function openMemberModal() {
            const modal = document.getElementById('memberModal');
            const list = document.getElementById('memberListModal');

            let html = '<div class="member-list-modal">';
            state.members.forEach(member => {
                html += `
                    <div class="member-item-modal"
                         onclick="selectMemberFromModal('${member.id}')">
                        <strong>${member.name}</strong>
                        <div class="member-item-email">${member.email || 'member@example.com'}</div>
                    </div>
                `;
            });
            html += '</div>';

            list.innerHTML = html;
            modal.style.display = 'flex';
        }
        
        function closeMemberModal() {
            document.getElementById('memberModal').style.display = 'none';
        }
        
        function selectMemberFromModal(memberId) {
            const member = state.members.find(m => m.id === memberId);
            if (member) {
                selectMember(member);
                closeMemberModal();
            }
        }
        
        // 发布内容
        async function publishContent() {
            if (!state.currentUser) {
                alert('请先选择用户！');
                return;
            }
            
            const type = document.getElementById('contentType').value;
            const title = document.getElementById('contentTitle').value;
            const body = document.getElementById('contentBody').value;
            const status = document.getElementById('contentStatus').value;
            
            if (!body) {
                alert('请输入内容！');
                return;
            }
            
            await apiRequest('/contents', 'POST', {
                publisherType: 'member',
                memberId: state.currentUser.id,
                contentType: type,
                title,
                body,
                status
            });
            
            document.getElementById('contentTitle').value = '';
            document.getElementById('contentBody').value = '';
            
            loadContents();
        }
        
        // 切换标签
        function switchTab(tab) {
            state.currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            renderContents();
        }
        
        // 渲染内容列表
        function renderContents() {
            const container = document.getElementById('contentList');
            
            let filteredContents = [...state.contents];
            
            switch (state.currentTab) {
                case 'draft':
                    filteredContents = filteredContents.filter(c => c.status === 'draft');
                    break;
                case 'archived':
                    filteredContents = filteredContents.filter(c => c.status === 'archived');
                    break;
                case 'trash':
                    filteredContents = filteredContents.filter(c => c.deleted);
                    break;
                default:
                    filteredContents = filteredContents.filter(c => !c.deleted);
            }
            
            if (filteredContents.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        <p>当前标签页暂无内容</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            filteredContents.forEach(content => {
                let tags = [
                    `<span class="tag">${content.type.toUpperCase()}</span>`,
                    `<span class="tag publisher-${content.publisher.type}">${content.publisher.name}</span>`
                ];
                
                if (content.status === 'draft') tags.push('<span class="tag draft">草稿</span>');
                if (content.status === 'archived') tags.push('<span class="tag archived">归档</span>');
                if (content.deleted) tags.push('<span class="tag deleted">已删除</span>');
                
                html += `
                    <div class="content-item ${content.deleted ? 'deleted' : ''} ${content.status === 'archived' ? 'archived' : ''}">
                        <div class="content-header">
                            <div class="content-title">${content.title || content.body.substring(0, 40) + '...'}</div>
                            <div class="content-meta">${tags.join('')}</div>
                        </div>
                        <div class="content-body">${content.body}</div>
                        <div class="content-actions">
                            ${content.deleted ? `
                                <button class="btn-success" onclick="restoreContent('${content.id}')">恢复</button>
                            ` : `
                                <button onclick="likeContent('${content.id}')">👍 点赞</button>
                                <button class="btn-primary" onclick="replyContent('${content.id}')">回复</button>
                                ${content.status === 'draft' ? `<button class="btn-success" onclick="publishDraft('${content.id}')">发布</button>` : ''}
                                ${content.status !== 'archived' ? `<button onclick="archiveContent('${content.id}')">归档</button>` : ''}
                                <button class="btn-danger" onclick="deleteContent('${content.id}')">删除</button>
                            `}
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // 内容操作函数
        async function likeContent(id) {
            if (!state.currentUser) return;
            await apiRequest(`/contents/${id}/like`, 'POST', { author: state.currentUser });
            alert('点赞成功！');
            loadContents();
        }
        
        async function replyContent(id) {
            if (!state.currentUser) return;
            const replyBody = prompt('请输入回复内容:');
            if (replyBody) {
                await apiRequest(`/contents/${id}/reply`, 'POST', {
                    author: state.currentUser,
                    body: replyBody
                });
                loadContents();
            }
        }
        
        async function publishDraft(id) {
            await apiRequest(`/contents/${id}/publish`, 'POST');
            loadContents();
        }
        
        async function archiveContent(id) {
            await apiRequest(`/contents/${id}/archive`, 'POST');
            loadContents();
        }
        
        async function deleteContent(id) {
            if (confirm('确定要删除这个内容吗？')) {
                await apiRequest(`/contents/${id}`, 'DELETE');
                loadContents();
            }
        }
        
        async function restoreContent(id) {
            await apiRequest(`/contents/${id}/restore`, 'POST');
            loadContents();
        }
        
        // 刷新所有数据
        function refreshAll() {
            loadMembers();
            loadCommunities();
            loadContents();
        }
        
        // 加载演示数据
        async function loadDemoData() {
            if (!state.currentUser) {
                alert('请先创建并选择用户！');
                return;
            }
            
            // 创建演示内容
            const demoContents = [
                { type: 'article', title: 'JavaScript 入门指南', body: '本指南将带你从零基础开始学习 JavaScript...', status: 'published' },
                { type: 'post', title: '欢迎来到社区！', body: '大家好，欢迎加入我们的社区！', status: 'published' },
                { type: 'note', title: '学习笔记', body: '今天学到了很多，记录一下...', status: 'draft' }
            ];
            
            for (const content of demoContents) {
                await apiRequest('/contents', 'POST', {
                    publisherType: 'member',
                    memberId: state.currentUser.id,
                    contentType: content.type,
                    title: content.title,
                    body: content.body,
                    status: content.status
                });
            }
            
            loadContents();
            alert('演示数据加载成功！');
        }
    </script>
</body>
</html>
